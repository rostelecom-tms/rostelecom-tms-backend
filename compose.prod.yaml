# я запускаюсь через "docker compose -f compose.prod.yaml up"
# я выключаюсь через "docker compose -f compose.prod.yaml down"

services:
  tms-db:
    image: pgvector/pgvector:pg16
    container_name: tms-db
    restart: always
    env_file: .env
    volumes:
      - tms_pgdata:/var/lib/postgresql/data
    networks:
      - tms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tms-redis:
    image: redis:7-alpine
    container_name: tms-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - tms_redisdata:/data
    networks:
      - tms-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tms-ollama:
    image: ollama/ollama:latest
    container_name: tms-ollama
    restart: always
    environment:
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-qwen3:4b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    entrypoint: ["/bin/sh", "/opt/ollama-bootstrap.sh"]
    volumes:
      - tms_ollamadata:/root/.ollama
      - ./ollama-bootstrap.sh:/opt/ollama-bootstrap.sh:ro
    networks:
      - tms-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tms-back:
    build: .
    container_name: tms-back
    restart: always
    env_file: .env
    depends_on:
      tms-db:
        condition: service_healthy
      tms-redis:
        condition: service_started
      tms-ollama:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://tms-db:5432/${POSTGRES_DB}
      REDIS_HOST: tms-redis
      REDIS_PORT: 6379
      APP_CORS_ORIGIN: ${APP_URL}
    networks:
      - tms-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tms-front:
    build:
      context: ../rostelecom-tms-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: tms-front
    restart: always
    depends_on:
      - tms-back
    ports:
      - "80:80"
    networks:
      - tms-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  tms-network:
    name: tms-network
    driver: bridge

volumes:
  tms_pgdata:
    name: tms-pgdata
    driver: local
  tms_redisdata:
    name: tms-redisdata
    driver: local
  tms_ollamadata:
    name: tms-ollamadata
    driver: local